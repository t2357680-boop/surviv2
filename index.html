    };

    let currentQuestion = 0;
    let userChoices = []; 

    function startGame() {
        document.getElementById('intro-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        renderQuestion();
    }

    function renderQuestion() {
        const progress = ((currentQuestion) / questions.length) * 100;
        document.getElementById('progress').style.width = progress + '%';

        const q = questions[currentQuestion];
        document.getElementById('q-title').innerText = q.title;
        document.getElementById('q-text').innerText = q.text;
        
        const choicesContainer = document.getElementById('choices');
        choicesContainer.innerHTML = ''; 
        
        q.options.forEach(option => {
            const button = document.createElement('button');
            button.innerText = option.text;
            button.onclick = () => makeChoice(option.caseType);
            choicesContainer.appendChild(button);
        });
    }

    function makeChoice(caseType) {
        userChoices.push(caseType); 
        currentQuestion++;
        
        if (currentQuestion < questions.length) {
            renderQuestion(); 
        } else {
            showResult(); 
        }
    }

    function showResult() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('game-container').style.backgroundColor = 'transparent';
        document.getElementById('game-container').style.boxShadow = 'none';
        document.getElementById('result-section').style.display = 'block';

        const finalChoice = userChoices[Math.floor(Math.random() * userChoices.length)];
        const data = historicalCases[finalChoice];
        
        let tagsHtml = '';
        data.tags.forEach(tag => { tagsHtml += `<div class="hashtag">${tag}</div>`; });

        const resultContent = document.getElementById('result-content');
        resultContent.innerHTML = `
            <div class="fate-card">
                <div class="fate-title">你的命運是...<br>${data.title}</div>
                <div class="tags-container">${tagsHtml}</div>
                
                <div class="player-story">
                    <strong>你在遊戲中：</strong><br>${data.playerStory}
                </div>
                
                <div class="real-history">
                    <div class="real-title">📜 ${data.realTitle}</div>
                    <div class="real-text">${data.realText}</div>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
